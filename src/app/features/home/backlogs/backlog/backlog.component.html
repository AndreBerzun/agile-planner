<form [formGroup]="backlog">
  <retro-card cdkDrag>
    <retro-card-header>
      <button cdkDragHandle class="small">::</button>
      <retro-card-title>
        BCK-LOG{{ backlog.value.id!.substring(0, 3) }} \\ ETA: {{ projectedCompletion | async }} days
      </retro-card-title>
      <button class="danger small" (click)="remove.emit()">X</button>
    </retro-card-header>

    <textarea placeholder="Enter backlog item details..." formControlName="rawInput"></textarea>
  </retro-card>
</form>
