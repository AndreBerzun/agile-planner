<div class="d-flex align-items-center">
  <h2 class="flex-grow-1"><span>## PAST_SPRINTS || ACP-004</span></h2>
  <b>~VLCTY: {{ medianVelocity() }} //</b>
</div>

<div class="d-flex flex-column">
  <div cdkDropList (cdkDropListDropped)="onSprintDrop($event)">
    @for (sprint of state.form.controls.sprints.controls; track sprint.value.id) {
      <form [formGroup]="sprint">
        <retro-card cdkDrag>
          <retro-card-header>
            <button cdkDragHandle class="small">::</button>

            <retro-card-title class="date-input-wrapper">
              <label for="startDate"></label>
              <input id="startDate" type="date" placeholder="..." formControlName="startDate">
            </retro-card-title>
            <retro-card-title class="date-input-wrapper">
              <label for="endDate"></label>
              <input id="endDate" type="date" placeholder="..." formControlName="endDate">
            </retro-card-title>

            <button class="danger small" (click)="state.removeSprint(sprint.value.id!)">X</button>
          </retro-card-header>

          <textarea placeholder="Enter sprint details..." formControlName="rawInput"></textarea>
        </retro-card>
      </form>
    }
  </div>

  <button class="big mb-5" (click)="state.addSprint()">Add_sprint</button>
</div>
